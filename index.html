                ins.className = 'adsbygoogle';
                ins.style.display = 'block';
                ins.setAttribute('data-ad-client', PUBLISHER_ID);
                ins.setAttribute('data-ad-slot', adSlot);
                ins.setAttribute('data-ad-format', 'auto');
                ins.setAttribute('data-full-width-responsive', 'true');
                
                container.innerHTML = '';

                const headerContent = '';
                
                const levelsHTML = state.levels.map((level, index) => {
                    const progress = state.levelProgress[level.id] || 0;
                    const progressPercent = (progress / level.totalQuestions) * 100;
                    
                    let levelCard = `
                    <div class="level-card ${!level.unlocked ? 'locked' : ''}" onclick="${level.unlocked ? `openLevel(${level.id})` : ''}">

            // Quiz
            window.startQuiz = function(levelId) {
                const level = state.levels.find(l => l.id === levelId);
                let levelQuestions;
                
                // Get questions based on level
                switch(levelId) {
                    case 1:
                        levelQuestions = questionBanks.beginner;
                        break;
                    case 2:
                        levelQuestions = questionBanks.intermediate;
                        break;
                    case 3:
                        levelQuestions = questionBanks.advanced;
                        break;
                    case 4:
                        levelQuestions = questionBanks.expert;
                        break;
                    default:
                        levelQuestions = questionBanks.beginner;
                }

                // Randomize and limit to 100 questions
                const shuffledQuestions = [...levelQuestions].sort(() => Math.random() - 0.5);
                const questions = shuffledQuestions.slice(0, 100);

                let currentQuestion = 0;
                let score = 0;
                let selectedAnswer = null;
                let answerSubmitted = false;
                let adShown = false;

                function renderQuestion() {
                    if (currentQuestion >= questions.length) {
                        completeQuiz(levelId, score, questions.length);
                        return;
                    }

                    // Show ad every 10 questions
                    if (currentQuestion > 0 && currentQuestion % 10 === 0 && !adShown) {
                        showQuizAd(() => {
                            adShown = true;
                            continueToQuestion();
                        });
                        return;
                    }

                    const q = questions[currentQuestion];
                    
                    const headerContent = `
                        <div class="quiz-progress">
                            <div class="quiz-progress-fill" style="width: ${(currentQuestion/questions.length)*100}%"></div>
                        </div>
                        <div class="quiz-stats">
                            <span>Question ${currentQuestion + 1}/${questions.length}</span>
                            <span>Score: ${score}</span>
                        </div>
                        <div class="question-header">
                            <div class="question-text">${q.question}</div>
                        </div>
                    `;

                    const optionsHTML = q.options.map((option, index) => {
                        let optionClass = 'option-btn';
                        if (selectedAnswer === index && !answerSubmitted) optionClass += ' selected';
                        if (answerSubmitted) {
                            if (index === q.correct) optionClass += ' correct';
                            else if (selectedAnswer === index && selectedAnswer !== q.correct) optionClass += ' wrong';
                        }
                        return `<button class="${optionClass}" onclick="selectAnswer(${index})" ${answerSubmitted ? 'disabled' : ''}>${option}</button>`;
                    }).join('');

                    const mainContent = `
                        <div class="quiz-container">
                            <div class="options-grid">
                                ${optionsHTML}
                            </div>
                            <div class="btn-group">
                                ${!answerSubmitted ? 
                                    '<button class="btn" onclick="submitAnswer()" ' + (selectedAnswer === null ? 'disabled' : '') + '>Submit Answer</button>' : 
                                    '<button class="btn" onclick="nextQuestion()">Next Question</button>'
                                }
                            </div>
                        </div>
                        
                        <!-- Quiz Page Ad -->
                        <div class="ad-container" id="quiz-ad"></div>
                    `;

                    renderWithHeader(headerContent, mainContent);
                    
                    // Initialize quiz page ad
                    setTimeout(() => {
                        createAdUnit('quiz-ad', '1234567895'); // Replace with your actual quiz ad slot ID
                    }, 500);

                    // Make functions available for this quiz
                    window.selectAnswer = function(index) {
                        if (!answerSubmitted) {
                            selectedAnswer = index;
                            renderQuestion();
                        }
                    };

                    window.submitAnswer = function() {
                        if (selectedAnswer !== null && !answerSubmitted) {
                            answerSubmitted = true;
                            if (selectedAnswer === q.correct) {
                                score++;
                            }
                            renderQuestion();
                        }
                    };

                    window.nextQuestion = function() {
                        currentQuestion++;
                        selectedAnswer = null;
                        answerSubmitted = false;
                        adShown = false;
                        renderQuestion();
                    };
                }

                function showQuizAd(callback) {
                    const adContainer = document.createElement('div');
                    adContainer.className = 'ad-container';
                    adContainer.style.position = 'fixed';
                    adContainer.style.top = '50%';
                    adContainer.style.left = '50%';
                    adContainer.style.transform = 'translate(-50%, -50%)';
                    adContainer.style.zIndex = '1000';
                    adContainer.style.maxWidth = '400px';
                    adContainer.style.background = 'white';
                    adContainer.style.padding = '20px';
                    adContainer.style.borderRadius = '16px';
                    adContainer.style.boxShadow = '0 10px 40px rgba(0,0,0,0.2)';
                    
                    const adInner = document.createElement('div');
                    adInner.id = 'interstitial-ad';
                    adContainer.appendChild(adInner);
                    
                    const closeBtn = document.createElement('button');
                    closeBtn.textContent = 'Continue to Quiz';
                    closeBtn.className = 'btn';
                    closeBtn.style.marginTop = '15px';
                    closeBtn.onclick = () => {
                        document.body.removeChild(adContainer);
                        callback();
                    };
                    adContainer.appendChild(closeBtn);
                    
                    document.body.appendChild(adContainer);
                    
                    setTimeout(() => {
                        createAdUnit('interstitial-ad', '1234567896'); // Replace with your actual interstitial ad slot ID
                    }, 100);
                }

                function continueToQuestion() {
                    renderQuestion();
                }

                renderQuestion();
            };

            window.completeQuiz = function(levelId, score, totalQuestions) {
                const pointsEarned = score * 10;
                state.points += pointsEarned;
                
                // Update level progress
                state.levelProgress[levelId] = Math.max(state.levelProgress[levelId] || 0, score);
                
                // Check if level is completed (all questions answered correctly at least once)
                if (state.levelProgress[levelId] >= totalQuestions) {
                    const level = state.levels.find(l => l.id === levelId);
                    if (level) {
                        level.completed = true;
                        
                        // Unlock next level
                        const nextLevel = state.levels.find(l => l.id === levelId + 1);
                        if (nextLevel) {
                            nextLevel.unlocked = true;
                        }
                    }
                }

                const pointsMsg = `+${pointsEarned} points!`;
                const accuracy = Math.round((score/totalQuestions)*100);
                
                const headerContent = '';
                
                const mainContent = `
                    <div class="completion-screen">
                        <div class="reward-icon">🏆</div>
                        <div class="reward-title">Quiz Complete!</div>
                        <div class="points-badge">${pointsMsg}</div>
                        
                        <div class="score-details">
                            <div class="score-item">
                                <span>Correct Answers:</span>
                                <strong>${score}/${totalQuestions}</strong>
                            </div>
                            <div class="score-item">
                                <span>Accuracy:</span>
                                <strong>${accuracy}%</strong>
                            </div>
                            <div class="score-item">
                                <span>Points Earned:</span>
                                <strong>${pointsEarned}</strong>
                            </div>
                            <div class="score-item">
                                <span>Total Points:</span>
                                <strong>${state.points}</strong>
                            </div>
                        </div>
                        
                        <!-- Completion Screen Ad -->
                        <div class="ad-container" id="completion-ad"></div>
                        
                        <div class="btn-group">
                            <button class="btn" onclick="renderMainMenu()">🌟 Main Menu</button>
                            <button class="btn btn-secondary" onclick="startQuiz(${levelId})">🔄 Try Again</button>
                        </div>
                    </div>
                `;

                renderWithHeader(headerContent, mainContent, false);
                
                setTimeout(() => {
                    createAdUnit('completion-ad', '1234567897'); // Replace with your actual completion ad slot ID
                }, 500);
            };

            // Initial render
            if (state.name) {
                renderMainMenu();
            } else {
                renderWelcome();
            }

            // Make functions global
            window.renderMainMenu = renderMainMenu;
            window.openLevel = openLevel;
            window.startQuiz = startQuiz;
        })();
    </script>
</body>
</html>
